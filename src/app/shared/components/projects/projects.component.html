<div class="carousel-container">
    <div class="carousel-header">
        <div class="section-head">
            <span class="eyebrow">PORTAFOLIO</span>
            <h1 class="section-title">Proyectos Destacados</h1>
        </div>
        <div class="arrows">
            <button class="arrow prev" (click)="scrollCarousel(-1)" aria-label="Anterior">&#10094;</button>
            <button class="arrow next" (click)="scrollCarousel(1)" aria-label="Siguiente">&#10095;</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="tabs">
            <span *ngFor="let tab of tabs" (click)="filterTypeProject(tab.filter)"
                [ngClass]="{'active' : tab.filter === typeProject}">{{ tab.name }}</span>
        </div>

        <div class="slider" #carouselWrapper>
            <div #card class="card" *ngFor="let card of cards">
                <div class="card-media">
                    <img [src]="card.image" [alt]="card.title" loading="lazy">
                    <span class="card-type">{{ card.type }}</span>
                    <span class="card-dev" *ngIf="card.devMode">En desarrollo</span>
                </div>

                <div class="card-body">
                    <h2>{{ card.title }}</h2>
                    <p *ngIf="card.description">{{ card.description }}</p>

                    <div class="card-tech">
                        <figure *ngFor="let tech of card.techs">
                            <img [src]="tech.icon" [alt]="tech.name" [title]="tech.name" loading="lazy">
                        </figure>
                    </div>

                    <div class="card-actions" *ngIf="card.story || card.demo || card.repo">
                        <a *ngIf="card.story" class="btn btn-demo" [routerLink]="['/project', card.slug]">
                            Ver caso
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="m9 18 6-6-6-6" />
                            </svg>
                        </a>
                        <button *ngIf="card.demo" class="btn"
                            [ngClass]="card.story ? 'btn-code' : 'btn-demo'" (click)="openExternal(card.demo!)">
                            Demo
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M15 3h6v6" />
                                <path d="M10 14 21 3" />
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                            </svg>
                        </button>
                        <button *ngIf="card.repo" class="btn btn-code" (click)="openExternal(card.repo!)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
                            </svg>
                            Código
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
