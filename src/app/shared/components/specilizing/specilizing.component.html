<div class="wrapper">
  <div class="section-head">
    <span class="eyebrow">HABILIDADES</span>
    <h1 class="title">Áreas de Especialización</h1>
    <p class="subtitle">
      Combino desarrollo y diseño para construir productos digitales completos:
      rápidos, escalables y centrados en las personas.
    </p>
  </div>

  <div class="cards-wrapper">
    <div class="card" #chart *ngFor="let job of jobs">
      <div class="card-icon" [ngSwitch]="job.key">
        <!-- Frontend -->
        <svg *ngSwitchCase="'frontend'" xmlns="http://www.w3.org/2000/svg" width="28" height="28"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M7 8l-4 4l4 4" />
          <path d="M17 8l4 4l-4 4" />
          <path d="M14 4l-4 16" />
        </svg>
        <!-- Móvil -->
        <svg *ngSwitchCase="'mobile'" xmlns="http://www.w3.org/2000/svg" width="28" height="28"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M6 5a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-14z" />
          <path d="M11 4h2" />
          <path d="M12 17v.01" />
        </svg>
        <!-- Diseño UI/UX -->
        <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" width="28" height="28"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 21a9 9 0 0 1 0 -18a9 8 0 0 1 9 8a4.5 4 0 0 1 -4.5 4h-2.5a2 2 0 0 0 -1 3.75a1.3 1.3 0 0 1 -1 2.25" />
          <path d="M7.5 10.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
          <path d="M12 7.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
          <path d="M16.5 10.5m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
        </svg>
      </div>
      <h2 class="card-title">{{ job.title }}</h2>
      <p class="card-description">{{ job.description }}</p>
      <div class="card-tags">
        <span *ngFor="let tag of job.tags">{{ tag }}</span>
      </div>
    </div>
  </div>
</div>
